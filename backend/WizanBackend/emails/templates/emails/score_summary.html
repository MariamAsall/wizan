<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 40px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #3C3489;
      margin-bottom: 24px;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .score-box {
      background: #EEEDFE;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    .score-number {
      font-size: 56px;
      font-weight: bold;
      color: #3C3489;
      line-height: 1;
    }
    .score-label {
      font-size: 13px;
      color: #3C3489;
      margin-top: 6px;
    }
    .zone-label {
      font-size: 16px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .tip {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .button {
      display: inline-block;
      background-color: #3C3489;
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Wizān وِزان</div>
    <div class="title">Hi, {{ name }}! 👋</div>

    <div class="score-box">
      <div class="score-number">{{ score }}</div>
      <div class="score-label">out of 100</div>
    </div>

    <div class="zone-label">{{ zone_label }}</div>
    <p class="tip">{{ tip }}</p>

    <a href="http://localhost:5173/dashboard" class="button">
      View my day →
    </a>

    <div class="footer">
      Wizan — Cognitive Load Management
    </div>
  </div>
</body>
</html>
