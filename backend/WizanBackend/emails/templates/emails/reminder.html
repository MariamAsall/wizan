<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 40px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #3C3489;
      margin-bottom: 24px;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .task-box {
      background: #FAEEDA;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      border-left: 4px solid #EF9F27;
    }
    .task-name {
      font-size: 18px;
      font-weight: bold;
      color: #633806;
      margin-bottom: 6px;
    }
    .task-deadline {
      font-size: 13px;
      color: #633806;
    }
    .body-text {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .button {
      display: inline-block;
      background-color: #3C3489;
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Wizān وِزان</div>
    <div class="title">⏰ Deadline tomorrow, {{ name }}</div>

    <div class="task-box">
      <div class="task-name">{{ task_name }}</div>
      <div class="task-deadline">Due: {{ deadline }}</div>
    </div>

    <p class="body-text">
      You have a task due tomorrow. Wizan wanted to give you a heads up
      so you can plan ahead and tackle it with a clear mind.
    </p>

    <a href="http://localhost:5173/tasks" class="button">
      View my tasks →
    </a>

    <div class="footer">
      Wizan — Cognitive Load Management
    </div>
  </div>
</body>
</html>
