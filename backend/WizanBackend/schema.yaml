      operationId: tasks_override_create
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Task'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Task'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/tasks/regulate/:
    post:
      operationId: tasks_regulate_create
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Task'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Task'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
  /api/users/me/:
    delete:
      operationId: users_me_destroy
      tags:
      - users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
          description: ''
  /api/voice/logs/:
    get:
      operationId: voice_logs_list
      description: GET /api/voice/logs/
      tags:
      - voice
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VoiceLog'
          description: ''
  /api/voice/plan/:
    post:
      operationId: voice_plan_create
      description: |-
        POST /api/voice/plan/
        المرحلة الثانية: استقبال النص الجاهز، تمريره للـ Agent، وحفظ السجل.
      tags:
      - voice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceInput'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VoiceInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VoiceInput'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoicePlanResponse'
          description: ''
  /api/voice/transcribe/:
    post:
      operationId: voice_transcribe_create
      description: |-
        POST /api/voice/transcribe/
        المرحلة الأولى: استقبال ملف الصوت وتفريغه إلى نص فقط دون معالجة العميل الذكي.
      tags:
      - voice
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscribeResponse'
          description: ''
components:
  schemas:
    ActionTypeEnum:
      enum:
      - plan_request
      - task_add
      - query
      type: string
      description: |-
        * `plan_request` - Plan Request
        * `task_add` - Task Add
        * `query` - Query
    AllowedTask:
      type: object
      properties:
        score:
          type: integer
        cognitive_load:
          type: string
        message:
          type: string
        allowed_tasks:
          type: array
          items:
            type: string
      required:
      - allowed_tasks
      - cognitive_load
      - message
      - score
    AskDocument:
      type: object
      properties:
        query:
          type: string
      required:
      - query
    AskDocumentResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
      required:
      - answer
      - sources
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - new_password
      - old_password
    ChatFeedback:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
        rating:
          type: integer
      required:
      - answer
      - question
      - rating
    CognitiveBriefing:
      type: object
      properties:
        summary:
          type: string
    CognitiveLogSerializers:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        score:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        quiz_answers: {}
        log_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
          readOnly: true
        final_score:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        calculation_note:
          type: string
          maxLength: 100
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - log_date
      - user
    CognitiveScore:
      type: object
      properties:
        score:
          type: integer
      required:
      - score
    DeleteAccountResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    DocumentStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
      required:
      - id
      - status
    DocumentUpload:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    FeedbackStats:
      type: object
      properties:
        likes:
          type: integer
        dislikes:
          type: integer
        total:
          type: integer
        like_percentage:
          type: number
          format: double
        dislike_percentage:
          type: number
          format: double
      required:
      - dislike_percentage
      - dislikes
      - like_percentage
      - likes
      - total
    LanguageEnum:
      enum:
      - en
      - ar
      type: string
      description: |-
        * `en` - English
        * `ar` - Arabic
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        message:
          type: string
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
      required:
      - created_at
      - id
      - message
      - title
      - user
    NotificationCount:
      type: object
      properties:
        unread_count:
          type: integer
      required:
      - unread_count
    NotificationTypeEnum:
      enum:
      - info
      - success
      - warning
      - ai
      type: string
      description: |-
        * `info` - Info
        * `success` - Success
        * `warning` - Warning
        * `ai` - AI
    PasswordResetConfirm:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - token
      - uid
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedQuizQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question_text_en:
          type: string
          maxLength: 255
        question_text_ar:
          type: string
          maxLength: 255
        question_type:
          $ref: '#/components/schemas/QuestionTypeEnum'
        weight:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_active:
          type: boolean
    PatchedTask:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        logs:
          type: array
          items:
            $ref: '#/components/schemas/TaskLog'
          readOnly: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/TaskStep'
          readOnly: true
        name:
          type: string
          maxLength: 255
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        deadline:
          type: string
          format: date
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/TaskStatusEnum'
          readOnly: true
        source:
          type: string
          maxLength: 20
        postponed_to:
          type: string
          format: date
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
    PatchedUserProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        phone_number:
          type: string
          maxLength: 20
        date_of_birth:
          type: string
          format: date
          nullable: true
        language:
          $ref: '#/components/schemas/LanguageEnum'
        profile_picture:
          type: string
          format: uri
          nullable: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
    PriorityEnum:
      enum:
      - high
      - medium
      - low
      type: string
      description: |-
        * `high` - High
        * `medium` - Medium
        * `low` - Low
    QuestionTypeEnum:
      enum:
      - yes_no
      - scale_1_5
      - text
      type: string
      description: |-
        * `yes_no` - Yes/No
        * `scale_1_5` - Scale 1-5
        * `text` - Text
    QuizAnswer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        answer:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
        question:
          type: string
          format: uuid
      required:
      - answer
      - created_at
      - id
      - question
      - user
    QuizQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question_text_en:
          type: string
          maxLength: 255
        question_text_ar:
          type: string
          maxLength: 255
        question_type:
          $ref: '#/components/schemas/QuestionTypeEnum'
        weight:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_active:
          type: boolean
      required:
      - question_text_ar
      - question_text_en
      - question_type
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        phone_number:
          type: string
          maxLength: 20
        date_of_birth:
          type: string
          format: date
          nullable: true
        password:
          type: string
          writeOnly: true
        password_confirm:
          type: string
          writeOnly: true
      required:
      - email
      - first_name
      - id
      - last_name
      - password
      - password_confirm
      - username
    RoleEnum:
      enum:
      - ADMIN
      - STUDENT
      type: string
      description: |-
        * `ADMIN` - Admin
        * `STUDENT` - Student
    SkipQuizResponse:
      type: object
      properties:
        message:
          type: string
        final_score:
          type: integer
      required:
      - final_score
      - message
    Source:
      type: object
      properties:
        source:
          type: string
        page:
          type: integer
      required:
      - page
      - source
    StudyChatRequest:
      type: object
      properties:
        query:
          type: string
      required:
      - query
    StudyChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
      required:
      - answer
      - sources
    SubmitQuiz:
      type: object
      properties:
        answers:
          type: array
          items: {}
      required:
      - answers
    SubmitQuizResponse:
      type: object
      properties:
        score:
          type: integer
        cognitive_log_id:
          type: integer
      required:
      - cognitive_log_id
      - score
    Success:
      type: object
      properties:
        success:
          type: boolean
      required:
      - success
    SuggestTasksResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: string
      required:
      - tasks
    Task:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        logs:
          type: array
          items:
            $ref: '#/components/schemas/TaskLog'
          readOnly: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/TaskStep'
          readOnly: true
        name:
          type: string
          maxLength: 255
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        deadline:
          type: string
          format: date
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/TaskStatusEnum'
          readOnly: true
        source:
          type: string
          maxLength: 20
        postponed_to:
          type: string
          format: date
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - logs
      - name
      - postponed_to
      - status
      - steps
      - user
    TaskDecomposeResponse:
      type: object
      properties:
        task_id:
          type: integer
        task_name:
          type: string
        tone:
          type: string
        estimated_time:
          type: string
        steps:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - estimated_time
      - steps
      - task_id
      - task_name
      - tone
    TaskLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        old_status:
          type: string
          maxLength: 15
        new_status:
          type: string
          maxLength: 15
        reason:
          type: string
        changed_at:
          type: string
          format: date-time
          readOnly: true
        task:
          type: integer
      required:
      - changed_at
      - id
      - new_status
      - old_status
      - task
    TaskStatusEnum:
      enum:
      - pending
      - allowed
      - postponed
      - overridden
      type: string
      description: |-
        * `pending` - Pending
        * `allowed` - Allowed
        * `postponed` - Postponed
        * `overridden` - Overridden
    TaskStep:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        step_order:
          type: integer
          readOnly: true
        description:
          type: string
          maxLength: 500
        is_completed:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        task:
          type: integer
      required:
      - created_at
      - description
      - id
      - step_order
      - task
    TranscribeResponse:
      type: object
      properties:
        success:
          type: boolean
        transcript:
          type: string
      required:
      - success
      - transcript
    UnreadCount:
      type: object
      properties:
        count:
          type: integer
      required:
      - count
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        phone_number:
          type: string
          maxLength: 20
        date_of_birth:
          type: string
          format: date
          nullable: true
        language:
          $ref: '#/components/schemas/LanguageEnum'
        profile_picture:
          type: string
          format: uri
          nullable: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
      required:
      - email
      - id
      - role
      - username
    VoiceInput:
      type: object
      description: |-
        What the frontend (or STT pipeline) sends to backend.
        The transcribed_text is the ONLY required field —
        audio never crosses this boundary.
      properties:
        transcribed_text:
          type: string
          description: Plain text output from the STT function. No audio blobs.
          maxLength: 5000
          minLength: 1
        session_id:
          type: string
          default: ''
          description: 'Optional: pass the session_id from a previous turn to continue
            the conversation.'
      required:
      - transcribed_text
    VoiceLog:
      type: object
      description: Read-only serializer used to return log data to the frontend.
      properties:
        id:
          type: integer
          readOnly: true
        action_type:
          allOf:
          - $ref: '#/components/schemas/ActionTypeEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/VoiceLogStatusEnum'
          readOnly: true
        transcribed_text:
          type: string
          readOnly: true
          description: The text output from Samy's STT function. Never store audio
            here.
        agent_response:
          type: string
          readOnly: true
          description: The daily plan text returned by the Planning Agent.
        session_id:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action_type
      - agent_response
      - created_at
      - id
      - session_id
      - status
      - transcribed_text
    VoiceLogStatusEnum:
      enum:
      - success
      - failed
      - partial
      type: string
      description: |-
        * `success` - Success
        * `failed` - Failed
        * `partial` - Partial
    VoicePlanResponse:
      type: object
      properties:
        plan:
          type: string
        session_id:
          type: string
        voice_log_id:
          type: integer
        score_context:
          type: object
          additionalProperties: {}
      required:
      - plan
      - score_context
      - session_id
      - voice_log_id
    VoiceTaskResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        task:
          $ref: '#/components/schemas/Task'
      required:
      - message
      - success
      - task
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
