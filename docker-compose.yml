services:
  backend:
    build:
      context: ./backend/WizanBackend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/WizanBackend:/app
    command: python manage.py runserver 0.0.0.0:8000