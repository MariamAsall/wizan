version: "3.9"
services:
  backend:
    build:
      context: ./backend/WizanBackend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/WizanBackend:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./backend/WizanBackend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/WizanBackend:/app
    command: celery -A WizanBackend worker -l info
    depends_on:
      - redis

  beat:
    build:
      context: ./backend/WizanBackend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/WizanBackend:/app
    command: celery -A WizanBackend beat -l info
    depends_on:
      - redis